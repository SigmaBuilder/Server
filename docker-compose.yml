services:
  postgres:
    image: postgres:17-alpine
    container_name: sigmabuilder_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-sigmabuilder}
      POSTGRES_USER:     ${DB_USER:-sigma}
      POSTGRES_PASSWORD: ${DB_PASS:-sigma_pass}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - ./db/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sigma} -d ${DB_NAME:-sigmabuilder}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
