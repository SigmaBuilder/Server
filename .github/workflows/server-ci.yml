name: Server CI

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: sigmabuilder
          POSTGRES_USER: sigma
          POSTGRES_PASSWORD: sigma_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sigma -d sigmabuilder"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm run test:unit

      - name: Initialize Database
        run: |
          PGPASSWORD=sigma_pass psql -h localhost -U sigma -d sigmabuilder -f db/01_schema.sql
          PGPASSWORD=sigma_pass psql -h localhost -U sigma -d sigmabuilder -f db/02_seeds.sql

      - name: Start Server in background
        env:
          NODE_ENV: test
        run: |
          npm start &
          npx wait-on tcp:3000

      - name: Run Integration Tests (Newman)
        run: npm run newman
